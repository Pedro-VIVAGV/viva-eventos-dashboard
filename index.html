<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva Eventos — Painel de Pendências</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#1a202c;min-height:100vh}
.topbar{background:#1a202c;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:#a0aec0;margin-top:1px}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#a0aec0}
.leg-dot{width:7px;height:7px;border-radius:50%}
.refresh-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer}
.refresh-btn:hover{background:rgba(255,255,255,.2)}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.svc-grid{grid-template-columns:1fr}}
.metric{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e2e8f0}
.metric-label{font-size:11px;color:#718096;margin-bottom:4px}
.metric-val{font-size:26px;font-weight:600}
.v-blue{color:#2b6cb0}.v-red{color:#c53030}.v-amber{color:#b7791f}.v-green{color:#276749}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{border:1px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;outline:none;height:36px}
.filters input{flex:1;min-width:180px}
.filters input:focus,.filters select:focus{border-color:#4a90d9}
.section-label{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px}
.section-label:first-child{margin-top:0}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:8px;overflow:hidden}
.card:hover{border-color:#cbd5e0}
.card.urgente{border-left:3px solid #e53e3e}
.card-header{padding:12px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.card-header:hover{background:#fafafa}
.card-num{font-size:11px;color:#a0aec0;min-width:22px;padding-top:2px}
.card-left{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:600;color:#1a202c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-meta span{font-size:11px;color:#718096}
.chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;background:#f7f8fa;color:#4a5568;border:1px solid #e2e8f0;white-space:nowrap}
.cdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:#c6f6d5;color:#22543d}.b-pend{background:#fed7d7;color:#742a2a}
.b-warn{background:#fefcbf;color:#744210}.b-past{background:#e2e8f0;color:#4a5568}.b-na{background:#f7f8fa;color:#a0aec0}
.prog-wrap{width:80px;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px}
.chevron{width:22px;height:22px;border-radius:50%;background:#f7f8fa;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#718096;flex-shrink:0;margin-top:2px;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:1px solid #f0f0f0;padding:12px 16px;display:none;background:#fafbfc}
.card-body.open{display:block}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.svc-item{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:7px;background:#fff;border:1px solid #e2e8f0}
.svc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-ok{background:#48bb78}.d-pend{background:#fc8181}.d-warn{background:#f6ad55}
.svc-name{font-size:11px;color:#718096;flex-shrink:0}
.svc-forn{font-size:11px;font-weight:500;color:#2d3748;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-sit{font-size:10px;margin-left:4px;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.ss-ok{background:#c6f6d5;color:#22543d}.ss-warn{background:#fefcbf;color:#744210}.ss-pend{background:#fed7d7;color:#742a2a}
.card-footer{margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:11px;color:#a0aec0;display:flex;gap:12px}
.empty{text-align:center;padding:60px 20px;color:#a0aec0;font-size:14px}
.loading{text-align:center;padding:60px 20px;color:#a0aec0;font-size:14px}
.error-box{background:#fff5f5;border:1px solid #feb2b2;border-radius:10px;padding:16px 20px;margin-bottom:16px;font-size:13px;color:#c53030;line-height:1.7}
.days-urg{color:#c53030;font-weight:600;font-size:11px}
.days-warn{color:#b7791f;font-size:11px}
.days-ok{color:#a0aec0;font-size:11px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Viva Eventos — Painel de Pendências</div>
    <div class="topbar-sub" id="topbar-sub">Carregando...</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#48bb78"></div>Contratado</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f6ad55"></div>Pago entrada</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fc8181"></div>Pendente</div>
    </div>
    <button class="refresh-btn" onclick="carregar()">↻ Atualizar</button>
  </div>
</div>

<div class="container">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Eventos futuros</div><div class="metric-val v-blue" id="m-fut">—</div></div>
    <div class="metric"><div class="metric-label">Com pendências</div><div class="metric-val v-red" id="m-pend">—</div></div>
    <div class="metric"><div class="metric-label">Urgentes ≤7 dias</div><div class="metric-val v-amber" id="m-urg">—</div></div>
    <div class="metric"><div class="metric-label">Tudo contratado</div><div class="metric-val v-green" id="m-ok">—</div></div>
  </div>
  <div class="filters">
    <input type="text" id="busca" placeholder="Buscar cliente, fornecedor ou serviço...">
    <select id="f-cidade">
      <option value="">Todas as cidades</option>
      <option>GV</option><option>TO</option><option>TF</option><option>IPA</option><option>ITA</option>
    </select>
    <select id="f-status">
      <option value="">Todos os status</option>
      <option value="pend">Com pendências</option>
      <option value="ok">Tudo OK</option>
      <option value="urg">Urgentes (7 dias)</option>
      <option value="past">Passados</option>
    </select>
    <select id="f-tipo"><option value="">Todos os tipos</option></select>
  </div>
  <div id="lista"><div class="loading">Carregando eventos...</div></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKdhl3mIj94_yAAdejvjLSf_LBNR-2ZbGI6DXIOXC3ut7bzRsJqQNcDsTgzQ2-JsSUaA/exec';

const GRUPOS = {
  'Local':[11,12],'Gerador':[13,14],'Climatizador':[15,16],'Vigia':[17,18],
  'Buffet':[19,20],'Extra Buffet':[22,23],'Sobremesa':[25,26],
  'Bebidas':[30,31],'Gelo':[32,33],'Bar de Drinks':[34,35],
  'Decora\u00e7\u00e3o':[36,37],'Estruturas':[38,39],
  'Atra\u00e7\u00e3o 01':[40,41],'Atra\u00e7\u00e3o 02':[42,43],
  'DJ Residente':[44,45],'VJ':[46,47],'MC':[48,49],
  'Seguran\u00e7as':[50,51],'Equipe Limpeza':[52,53],'Banheiro Qu\u00edmico':[54,55],
  'Aftermovie':[56,57],'Fotografia':[58,59],
  'Caneca + Tirante':[60,61],'Camisa':[62,63],'Chinelo':[64,65],
  'Kit Robe':[66,67],'\u00d3culos':[68,69],'Bon\u00e9 VIVA':[70,71]
};

const SIT_OK   = new Set(['Contratado','Pago Entrada','Comiss\u00e3o']);
const SIT_PEND = new Set(['N\u00e3o Iniciado','Negocia\u00e7\u00e3o','Contato Feito','Aguardando Contrato','Comercial']);
const EXCL_T   = new Set(['Particular','N\u00e3o agendar','ExpoAgro GV','Carnaval']);
const EXCL_KW  = ['Fl\u00e1vio: Fora','Janine: Viagem','ExpoAgro','Carnaval','N\u00e3o agendar'];
const CCOR     = {GV:'#378ADD',TO:'#1D9E75',TF:'#D85A30',IPA:'#7F77DD',ITA:'#D4537E'};
const DIAS     = ['Dom','Seg','Ter','Qua','Qui','Sex','S\u00e1b'];

let EVENTOS=[], tiposOk=false;

async function carregar(){
  document.getElementById('lista').innerHTML='<div class="loading">Carregando eventos...</div>';
  document.getElementById('topbar-sub').textContent='Carregando...';
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    EVENTOS=await res.json();
    const now=new Date().toLocaleString('pt-BR');
    document.getElementById('topbar-sub').textContent='Atualizado: '+now;
    if(!tiposOk) popularTipos();
    renderizar();
  }catch(e){
    document.getElementById('topbar-sub').textContent='Erro ao carregar';
    document.getElementById('lista').innerHTML=`<div class="error-box">
      <strong>N\u00e3o foi poss\u00edvel carregar os dados.</strong><br><br>
      Verifique se o Apps Script est\u00e1 implantado corretamente e com acesso <strong>"Qualquer pessoa"</strong>.<br><br>
      <small>Erro: ${e.message}</small>
    </div>`;
  }
}

function parsear(table){
  const rows=table.rows||[];
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const ev=[];
  function v(row,i){
    if(!row.c||!row.c[i]||row.c[i].v==null)return '';
    return String(row.c[i].v).trim();
  }
  function pd(row,i){
    if(!row.c||!row.c[i]||!row.c[i].v)return null;
    const s=String(row.c[i].v);
    const m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(m)return new Date(+m[1],+m[2],+m[3]);
    const d=new Date(s); return isNaN(d)?null:d;
  }
  for(const row of rows){
    const num=v(row,1); if(!num||isNaN(+num))continue;
    const fundo=v(row,4), tipo=v(row,9), data=pd(row,5);
    if(!data||EXCL_T.has(tipo)||EXCL_KW.some(k=>fundo.includes(k)))continue;
    const de=new Date(data.getFullYear(),data.getMonth(),data.getDate());
    const dt=Math.round((de-hoje)/864e5);
    const svcs={};let ok=0,pend=0;
    for(const[g,[cf,cs]]of Object.entries(GRUPOS)){
      const fv=v(row,cf),sv=v(row,cs);
      if(!sv||sv==='N\u00e3o H\u00e1')continue;
      let st;
      if(SIT_OK.has(sv)){st=sv==='Pago Entrada'?'warn':'ok';ok++;}
      else if(SIT_PEND.has(sv)){st='pend';pend++;}
      else continue;
      svcs[g]={fornecedor:fv,situacao:sv,status:st};
    }
    ev.push({num:+num,cidade:v(row,2),empresa:v(row,3),fundo,
      data:data.toLocaleDateString('pt-BR'),dia:DIAS[data.getDay()],
      tipo,horario:v(row,10),local:v(row,7),
      servicos:svcs,n_ok:ok,n_pend:pend,days_to:dt,passado:dt<0});
  }
  return ev.sort((a,b)=>a.days_to-b.days_to);
}

function popularTipos(){
  const tipos=[...new Set(EVENTOS.map(e=>e.tipo))].filter(Boolean).sort();
  const sel=document.getElementById('f-tipo');
  tipos.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
  tiposOk=true;
}

function renderizar(){
  const busca=document.getElementById('busca').value.toLowerCase();
  const cidade=document.getElementById('f-cidade').value;
  const status=document.getElementById('f-status').value;
  const tipo=document.getElementById('f-tipo').value;
  const fut=EVENTOS.filter(e=>!e.passado);
  const cp=fut.filter(e=>e.n_pend>0);
  const urg=fut.filter(e=>e.days_to<=7&&e.n_pend>0);
  document.getElementById('m-fut').textContent=fut.length;
  document.getElementById('m-pend').textContent=cp.length;
  document.getElementById('m-urg').textContent=urg.length;
  document.getElementById('m-ok').textContent=fut.length-cp.length;
  let f=EVENTOS.filter(e=>{
    if(cidade&&e.cidade!==cidade)return false;
    if(tipo&&e.tipo!==tipo)return false;
    if(status==='pend'&&(e.passado||!e.n_pend))return false;
    if(status==='ok'&&(e.passado||e.n_pend>0))return false;
    if(status==='urg'&&!(e.days_to<=7&&!e.passado&&e.n_pend>0))return false;
    if(status==='past'&&!e.passado)return false;
    if(busca){
      const h=[e.fundo,e.tipo,e.cidade,...Object.values(e.servicos).map(s=>s.fornecedor)].join(' ').toLowerCase();
      if(!h.includes(busca))return false;
    }
    return true;
  });
  if(!f.length){document.getElementById('lista').innerHTML='<div class="empty">Nenhum evento encontrado.</div>';return;}
  const urgF=f.filter(e=>!e.passado&&e.days_to<=14&&e.n_pend>0);
  const proxF=f.filter(e=>!e.passado&&!(e.days_to<=14&&e.n_pend>0));
  const pastF=f.filter(e=>e.passado);
  let html='',uid=0;
  if(urgF.length){html+='<div class="section-label">\u26a0 Aten\u00e7\u00e3o \u2014 pr\u00f3ximos 14 dias com pend\u00eancias</div>';urgF.forEach(e=>{html+=mkcard(e,uid++,true);});}
  if(proxF.length){html+=`<div class="section-label">${urgF.length?'Demais eventos futuros':'Pr\u00f3ximos eventos'}</div>`;proxF.forEach(e=>{html+=mkcard(e,uid++,false);});}
  if(pastF.length){html+='<div class="section-label">Passados</div>';pastF.forEach(e=>{html+=mkcard(e,uid++,false);});}
  document.getElementById('lista').innerHTML=html;
}

function mkcard(e,uid,urg){
  const tot=e.n_ok+e.n_pend,pct=tot?Math.round(e.n_ok/tot*100):100;
  const cor=CCOR[e.cidade]||'#888';
  const pc=!e.n_pend?'#48bb78':e.n_pend<=3?'#f6ad55':'#fc8181';
  let dt='';
  if(e.passado)dt=`<span class="days-ok">${Math.abs(e.days_to)}d atr\u00e1s</span>`;
  else if(e.days_to===0)dt='<span class="days-urg">Hoje!</span>';
  else if(e.days_to<=7)dt=`<span class="days-urg">em ${e.days_to}d</span>`;
  else if(e.days_to<=30)dt=`<span class="days-warn">em ${e.days_to}d</span>`;
  else dt=`<span class="days-ok">em ${e.days_to}d</span>`;
  let bdg='';
  if(e.passado)bdg='<span class="badge b-past">Passado</span>';
  else if(!tot)bdg='<span class="badge b-na">Sem servi\u00e7os</span>';
  else if(!e.n_pend)bdg='<span class="badge b-ok">Tudo OK</span>';
  else if(e.n_pend<=3)bdg=`<span class="badge b-warn">${e.n_pend} pendente${e.n_pend>1?'s':''}</span>`;
  else bdg=`<span class="badge b-pend">${e.n_pend} pendentes</span>`;
  const svcsH=Object.entries(e.servicos).map(([n,s])=>{
    const dc=s.status==='ok'?'d-ok':s.status==='warn'?'d-warn':'d-pend';
    const sc=s.status==='ok'?'ss-ok':s.status==='warn'?'ss-warn':'ss-pend';
    return `<div class="svc-item"><div class="svc-dot ${dc}"></div><div class="svc-name">${n}</div><div class="svc-forn" title="${s.fornecedor}">${s.fornecedor||'\u2014'}</div><span class="svc-sit ${sc}">${s.situacao}</span></div>`;
  }).join('');
  return `<div class="card${urg?' urgente':''}">
  <div class="card-header" onclick="tog(${uid})">
    <div class="card-num">#${e.num}</div>
    <div class="card-left">
      <div class="card-title">${e.fundo}</div>
      <div class="card-meta">
        <span style="display:inline-flex;align-items:center"><span class="cdot" style="background:${cor}"></span><strong style="font-size:11px">${e.cidade}</strong></span>
        <span class="chip">${e.tipo}</span>
        <span>${e.data} \u00b7 ${e.dia}</span>
        <span>${e.horario}</span>
        ${dt}
      </div>
    </div>
    <div class="card-right">
      ${bdg}
      ${tot?`<div style="display:flex;align-items:center;gap:5px"><span style="font-size:10px;color:#a0aec0">${e.n_ok}/${tot}</span><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${pc}"></div></div></div>`:''}
      <div class="chevron" id="chev-${uid}">\u25bc</div>
    </div>
  </div>
  <div class="card-body" id="body-${uid}">
    ${svcsH?`<div class="svc-grid">${svcsH}</div>`:'<div style="font-size:12px;color:#a0aec0">Nenhum servi\u00e7o registrado.</div>'}
    <div class="card-footer"><span>Empresa: <strong>${e.empresa}</strong></span>${e.local?`<span>Local: <strong>${e.local}</strong></span>`:''}</div>
  </div>
</div>`;
}

function tog(uid){
  const b=document.getElementById('body-'+uid),c=document.getElementById('chev-'+uid);
  if(!b||!c)return;
  const op=b.classList.contains('open');
  b.classList.toggle('open',!op);c.classList.toggle('open',!op);
}

['busca','f-cidade','f-status','f-tipo'].forEach(id=>{
  document.getElementById(id).addEventListener('input',renderizar);
  document.getElementById(id).addEventListener('change',renderizar);
});

carregar();
</script>
</body>
</html>
